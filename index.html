<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Valentine? 💘</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Floating Hearts Background -->
    <div class="hearts-bg" id="heartsBg"></div>
    
    <!-- Sparkles -->
    <div class="sparkles" id="sparkles"></div>

    <!-- Landing Page -->
    <div class="landing-page" id="landingPage">
        <div class="floating-elements">
            <span class="floating-emoji" style="top: 10%; left: 10%;">💖</span>
            <span class="floating-emoji" style="top: 15%; right: 15%; animation-delay: 0.5s;">💘</span>
            <span class="floating-emoji" style="top: 70%; left: 8%; animation-delay: 1s;">💝</span>
            <span class="floating-emoji" style="top: 80%; right: 10%; animation-delay: 1.5s;">💗</span>
            <span class="floating-emoji" style="top: 50%; left: 5%; animation-delay: 2s;">⭐</span>
            <span class="floating-emoji" style="top: 30%; right: 8%; animation-delay: 2.5s;">✨</span>
        </div>

        <div class="content-wrapper">
            <div class="bear-container">
                <div class="bear" onclick="bearHug()">🐻</div>
                <div class="speech-bubble">Click me! 🤗</div>
            </div>

            <h1 class="title">Will You Be My Valentine? 💘</h1>
            
            <div class="buttons-container">
                <button class="btn btn-yes" id="btnYes" onclick="sayYes()">YES</button>
                <button class="btn btn-no" id="btnNo" onmouseover="moveButton()" onclick="tryClickNo()">NO</button>
            </div>
        </div>
    </div>

    <!-- Date Schedule Page -->
    <div class="date-page" id="datePage">
        <div class="floating-elements">
            <span class="floating-emoji" style="top: 5%; left: 5%;">💖</span>
            <span class="floating-emoji" style="top: 10%; right: 10%; animation-delay: 0.5s;">💘</span>
            <span class="floating-emoji" style="top: 90%; left: 8%; animation-delay: 1s;">💝</span>
            <span class="floating-emoji" style="top: 85%; right: 5%; animation-delay: 1.5s;">💗</span>
        </div>

        <div class="date-content">
            <h1 class="date-title">Schedule Our Next Date 💕</h1>
            
            <div class="date-selector">
                <div class="selector-section">
                    <h3>Choose a Date 📅</h3>
                    <div class="calendar-grid" id="calendarGrid">
                        <!-- Calendar will be generated by JS -->
                    </div>
                </div>

                <div class="selector-section">
                    <h3>Choose a Time 🕐</h3>
                    <div class="time-grid" id="timeGrid">
                        <!-- Time slots will be generated by JS -->
                    </div>
                </div>
            </div>

            <div class="place-selector">
                <h3>Choose a Place 📍</h3>
                <div class="place-options">
                    <div class="place-card" onclick="selectPlace(this, 'movie')">
                        <span class="place-icon">🎬</span>
                        <span class="place-name">Movie Date</span>
                    </div>
                    <div class="place-card" onclick="selectPlace(this, 'cafe')">
                        <span class="place-icon">☕</span>
                        <span class="place-name">Cafe Date</span>
                    </div>
                    <div class="place-card" onclick="selectPlace(this, 'ramen')">
                        <span class="place-icon">🍜</span>
                        <span class="place-name">Ramen Date</span>
                    </div>
                </div>
            </div>

            <button class="btn btn-confirm" onclick="confirmDate()">Confirm Date 💕</button>
        </div>
    </div>

    <!-- Success Page -->
    <div class="success-page" id="successPage">
        <div class="success-content">
            <div class="big-heart">❤️💕❤️</div>
            <h2>It's a Date! 💕</h2>
            <p class="success-message">Can't wait to see you! 🥰</p>
            <div class="date-summary" id="dateSummary">
                <!-- Date summary will be shown here -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
